<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- fontawesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class=" bg-base-200 min-h-screen">
    <header>
<div class="navbar bg-base-100 shadow-sm px-20">
  <div class="flex-1 ">
    <div class="flex gap-2">
        <img src="./assets/github-logo.png" class="w-[3%]">
        <p class="font-bold text-2xl">GitHub Issues Tracker</p>
    </div>
        
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
   <button class="btn btn-primary text-white">
search
   </button>
  </div>
</div>
    </header>
    <main class="w-[80%] mx-auto">
<div class="bg-base-100 p-5 rounded-2xl my-6 shadow">
    <button class="btn btn-primary" id="allbtn">all</button>
    <button class="btn" id="openbtn">open</button>
    <button class="btn" id="closebtn">closed</button>

</div>
<div class="bg-base-100 p-5 rounded-t-2xl mt-3 shadow flex justify-between ">
    <div class="flex gap-3 items-center">
           <img src="./assets/Aperture.png" class="p-0.5 bg-gray-200 rounded-full w-10 h-10" alt="">
   <div class="flex flex-col">
   <p class="font-bold text-2xl"><span id="total">50</span> Issues</p>
   <p class="font-bold text-gray-500">Track and manage your project issues</p>
   </div>
    </div>
 
   <div class="flex gap-3 items-center ">
    <div class="w-2 h-2 bg-green-700 mt-1.5 rounded-full"></div>
    <p class="font-bold">open</p>
        <div class="w-2 h-2 bg-fuchsia-700 mt-1.5 rounded-full"></div>

    <p class="font-bold">closed</p>
   </div>
</div>
<section class="shadow">
    <div id="container" class="grid grid-cols-4 gap-2 p-2">
        <div class="p-2 bg-base-100 flex flex-col gap-4 m-2 shadow rounded-[10px] border-t-5 border-t-green-700">
            <div class="flex justify-between">
           <img src="./assets/Open-Status.png" alt="">
           <p class="px-5 bg-red-200 text-red-700 font-bold rounded-2xl">high</p>
            </div>
            <p class="font-bold text-[18px] ">Fix navigation menu on mobile devices</p>
            <p class=" text-gray-500 text-[15px]">The navigation menu doesn't collapse properly on mobile devices...</p>
            <div class="flex gap-4">
                 <p class="px-5 bg-red-200 text-red-700 font-bold rounded-2xl"><i class="fa-solid fa-bug"></i> bug</p>
                  <p class="px-5 bg-orange-200 text-orange-700 font-bold rounded-2xl"><i class="fa-solid fa-life-ring"></i> help wanted</p>
            </div>
            <hr class=" border-gray-400 border-t-2 mx-0">
            <p class="text-gray-500">#1 by john_doe</p>
            <p class="text-gray-500">1/15/2025</p>

        </div>

    </div>
</section>
    </main>
    <footer>
<script src="./script/home.js"></script>
    </footer>
</body>
</html>
